<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MI PANEL</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d2e;
      --surface2:  #222540;
      --border:    rgba(255,255,255,0.08);
      --accent:    #f0c040;
      --accent2:   #4fa3e0;
      --accent3:   #e05a7a;
      --accent4:   #50d99a;
      --text:      #f0f0f0;
      --text2:     #8890aa;
      --radius:    14px;
      --font-head: 'Bebas Neue', sans-serif;
      --font-body: 'Nunito', sans-serif;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 10% 0%, rgba(79,163,224,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 100%, rgba(240,192,64,0.05) 0%, transparent 55%);
    }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, #1a1d2e 0%, #0f1117 100%);
      border-bottom: 2px solid var(--accent);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    .header-left { display:flex; align-items:center; gap:12px; }
    .back-btn {
      background:transparent; border:1.5px solid var(--border); color:var(--text2);
      font-size:1.3rem; width:38px; height:38px; border-radius:10px; cursor:pointer;
      display:none; align-items:center; justify-content:center; transition:all 0.2s;
    }
    .back-btn:hover { border-color:var(--accent); color:var(--accent); }
    .back-btn.visible { display:flex; }
    header h1 {
      font-family:var(--font-head); font-size:1.9rem; letter-spacing:3px;
      color:var(--accent); text-shadow:0 0 24px rgba(240,192,64,0.35);
    }
    .clock { font-size:0.85rem; color:var(--text2); text-align:right; line-height:1.6; font-weight:700; }

    /* SCREENS */
    .screen { display:none; padding:20px 16px 40px; max-width:700px; margin:0 auto; animation:fadeUp 0.28s ease; }
    .screen.active { display:block; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    /* HOME */
    .menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:8px; }
    .menu-card {
      position:relative; background:var(--surface); border:1.5px solid var(--border);
      border-radius:20px; padding:36px 20px 28px; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; gap:10px;
      transition:transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      font-family:var(--font-body);
    }
    .menu-card:hover { transform:translateY(-4px); border-color:var(--accent); box-shadow:0 8px 32px rgba(240,192,64,0.12); }
    .menu-icon  { font-size:2.8rem; }
    .menu-label { font-size:1.2rem; font-weight:800; color:var(--text); }
    .menu-badge {
      position:absolute; top:14px; right:16px; background:var(--accent); color:#000;
      border-radius:20px; padding:2px 10px; font-size:0.75rem; font-weight:900; display:none;
    }
    .menu-badge.visible { display:block; }

    /* INPUTS */
    .input-field {
      width:100%; background:var(--surface); border:1.5px solid var(--border);
      border-radius:10px; color:var(--text); font-family:var(--font-body);
      font-size:1rem; font-weight:600; padding:12px 14px; outline:none;
      transition:border-color 0.2s; margin-bottom:10px;
    }
    .input-field:focus { border-color:var(--accent2); }
    .input-field::placeholder { color:var(--text2); }
    .textarea-field {
      width:100%; background:var(--surface); border:1.5px solid var(--border);
      border-radius:10px; color:var(--text); font-family:var(--font-body);
      font-size:1rem; font-weight:600; padding:12px 14px; outline:none;
      resize:vertical; min-height:110px; margin-bottom:12px; transition:border-color 0.2s;
    }
    .textarea-field:focus { border-color:var(--accent2); }
    .textarea-field::placeholder { color:var(--text2); }
    .btn-primary {
      background:var(--accent); color:#000; border:none; border-radius:10px;
      padding:12px 22px; font-family:var(--font-body); font-size:1rem; font-weight:800;
      cursor:pointer; transition:opacity 0.15s, transform 0.15s; white-space:nowrap;
    }
    .btn-primary:hover { opacity:0.88; transform:scale(0.98); }
    .btn-secondary {
      background:transparent; border:1.5px solid var(--border); color:var(--text2);
      border-radius:10px; padding:10px 18px; font-family:var(--font-body);
      font-size:0.9rem; font-weight:700; cursor:pointer; transition:border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color:var(--accent3); color:var(--accent3); }
    .btn-icon {
      background:transparent; border:none; cursor:pointer; font-size:1.1rem;
      padding:4px 8px; border-radius:6px; transition:background 0.15s; color:var(--text2);
    }
    .btn-icon:hover { background:var(--surface2); }
    .section-bar { display:flex; gap:10px; margin-bottom:10px; align-items:flex-start; }
    .section-bar .input-field { margin-bottom:0; }
    .lista { margin-top:6px; }

    /* NOTAS */
    .nota-item {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:16px; margin-bottom:10px; animation:fadeUp 0.2s ease;
    }
    .nota-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:8px; }
    .nota-titulo  { font-size:1.05rem; font-weight:800; color:var(--accent); }
    .nota-fecha   { font-size:0.75rem; color:var(--text2); white-space:nowrap; }
    .nota-texto   { font-size:0.95rem; color:var(--text); line-height:1.6; white-space:pre-wrap; }
    .nota-acciones { display:flex; gap:4px; align-items:center; }

    /* TAREAS */
    .tareas-stats { font-size:0.85rem; color:var(--text2); font-weight:700; margin-bottom:12px; }
    .tarea-item {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:14px 16px; margin-bottom:8px; display:flex; align-items:center; gap:12px; animation:fadeUp 0.2s ease;
    }
    .tarea-item.completada { opacity:0.5; }
    .tarea-check {
      width:26px; height:26px; border-radius:50%; border:2.5px solid var(--accent4);
      background:transparent; cursor:pointer; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:0.9rem; transition:background 0.15s;
    }
    .tarea-check.checked { background:var(--accent4); border-color:var(--accent4); color:#000; }
    .tarea-texto { flex:1; font-size:1rem; font-weight:700; color:var(--text); }
    .tarea-item.completada .tarea-texto { text-decoration:line-through; color:var(--text2); }

    /* ENLACES */
    .card-form { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:20px; }
    .form-title { font-size:0.85rem; font-weight:800; color:var(--text2); letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
    .categoria-titulo {
      font-family:var(--font-head); font-size:1.3rem; letter-spacing:2px; color:var(--text2);
      margin:20px 0 8px; padding-bottom:6px; border-bottom:1px solid var(--border);
    }
    .enlace-item {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:14px 16px; margin-bottom:8px; display:flex; align-items:center; gap:12px; animation:fadeUp 0.2s ease;
    }
    .enlace-nombre { flex:1; font-size:1rem; font-weight:800; color:var(--text); }
    .enlace-url { font-size:0.78rem; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; }
    .btn-abrir {
      background:var(--accent2); color:#fff; border:none; border-radius:8px;
      padding:8px 14px; font-family:var(--font-body); font-size:0.85rem; font-weight:800;
      cursor:pointer; white-space:nowrap; transition:opacity 0.15s; flex-shrink:0;
    }
    .btn-abrir:hover { opacity:0.85; }

    /* CALCULADORA */
    .calc-wrap { max-width:340px; margin:0 auto; }
    .calc-display {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:18px 20px 10px; font-size:2.6rem; font-weight:900; text-align:right;
      color:var(--text); word-break:break-all; min-height:70px;
      display:flex; align-items:flex-end; justify-content:flex-end;
    }
    .calc-expr { text-align:right; font-size:0.85rem; color:var(--text2); padding:4px 4px 12px; min-height:24px; font-weight:700; }
    .calc-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    .calc-btn {
      background:var(--surface); border:1px solid var(--border); border-radius:12px;
      color:var(--text); font-family:var(--font-body); font-size:1.3rem; font-weight:800;
      padding:18px 10px; cursor:pointer; transition:background 0.15s, transform 0.1s;
    }
    .calc-btn:hover  { background:var(--surface2); }
    .calc-btn:active { transform:scale(0.94); }
    .calc-btn.btn-op    { color:var(--accent2); }
    .calc-btn.btn-equal { background:var(--accent); color:#000; border-color:var(--accent); }
    .calc-btn.btn-danger { background:rgba(224,90,122,0.15); color:var(--accent3); border-color:transparent; }
    .calc-btn.span2 { grid-column:span 2; }
    .calc-history { margin-top:16px; max-height:140px; overflow-y:auto; }
    .calc-history-item { font-size:0.85rem; color:var(--text2); text-align:right; padding:4px 2px; border-bottom:1px solid var(--border); font-weight:700; }

    /* EMPTY */
    .empty-state { text-align:center; padding:40px 20px; color:var(--text2); font-size:1rem; font-weight:700; }
    .empty-state .empty-icon { font-size:2.5rem; display:block; margin-bottom:10px; }

    @media (max-width:400px) {
      header h1 { font-size:1.5rem; }
      .menu-card { padding:28px 12px 20px; }
      .menu-icon { font-size:2.2rem; }
      .calc-btn  { font-size:1.1rem; padding:14px 8px; }
      .calc-display { font-size:2rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <button class="back-btn" id="backBtn" onclick="goHome()">←</button>
      <h1 id="pageTitle">📋 MI PANEL</h1>
    </div>
    <div id="clock" class="clock"></div>
  </header>

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="menu-grid">
      <button class="menu-card" onclick="goTo('notas')">
        <span class="menu-icon">📝</span><span class="menu-label">Notas</span>
        <span class="menu-badge" id="badge-notas"></span>
      </button>
      <button class="menu-card" onclick="goTo('tareas')">
        <span class="menu-icon">✅</span><span class="menu-label">Tareas</span>
        <span class="menu-badge" id="badge-tareas"></span>
      </button>
      <button class="menu-card" onclick="goTo('enlaces')">
        <span class="menu-icon">🔗</span><span class="menu-label">Enlaces</span>
        <span class="menu-badge" id="badge-enlaces"></span>
      </button>
      <button class="menu-card" onclick="goTo('calculadora')">
        <span class="menu-icon">🧮</span><span class="menu-label">Calculadora</span>
      </button>
    </div>
  </div>

  <!-- NOTAS -->
  <div id="screen-notas" class="screen">
    <div class="section-bar">
      <input type="text" id="notaTitulo" class="input-field" placeholder="Título de la nota..." />
      <button class="btn-primary" onclick="agregarNota()">+ Agregar</button>
    </div>
    <textarea id="notaTexto" class="textarea-field" placeholder="Escribí tu nota acá..."></textarea>
    <div id="lista-notas" class="lista"></div>
  </div>

  <!-- TAREAS -->
  <div id="screen-tareas" class="screen">
    <div class="section-bar">
      <input type="text" id="tareaInput" class="input-field" placeholder="Nueva tarea..."
             onkeydown="if(event.key==='Enter') agregarTarea()" />
      <button class="btn-primary" onclick="agregarTarea()">+ Agregar</button>
    </div>
    <div class="tareas-stats" id="tareasStats"></div>
    <div id="lista-tareas" class="lista"></div>
    <button class="btn-secondary" onclick="limpiarTareasCompletadas()" style="margin-top:12px">🗑 Eliminar completadas</button>
  </div>

  <!-- ENLACES -->
  <div id="screen-enlaces" class="screen">
    <div class="card-form">
      <div class="form-title">➕ Nuevo enlace</div>
      <input type="text" id="enlaceNombre"    class="input-field" placeholder="Nombre (ej: Mercado Libre)" />
      <input type="url"  id="enlaceUrl"       class="input-field" placeholder="URL (ej: https://...)" />
      <input type="text" id="enlaceCategoria" class="input-field" placeholder="Categoría (ej: Compras, Noticias...)" />
      <div class="form-title" style="margin-top:16px">🔍 O búsqueda rápida</div>
      <select id="motorBusqueda" class="input-field">
        <option value="">— Elegir motor —</option>
        <option value="https://www.google.com/search?q=">Google</option>
        <option value="https://www.mercadolibre.com.ar/jm/search?as_word=">Mercado Libre</option>
        <option value="https://news.google.com/search?q=">Google News</option>
        <option value="https://www.youtube.com/results?search_query=">YouTube</option>
        <option value="https://www.infobae.com/buscar/?q=">Infobae</option>
      </select>
      <input type="text" id="terminoBusqueda" class="input-field" placeholder="Término (ej: vuelos baratos)" />
      <div style="font-size:0.8rem;color:var(--text2);margin-bottom:10px">
        Si elegís motor + término, se usa la búsqueda. Si no, se usa la URL manual.
      </div>
      <button class="btn-primary" onclick="agregarEnlace()">Guardar enlace</button>
    </div>
    <div id="lista-enlaces" class="lista"></div>
  </div>

  <!-- CALCULADORA -->
  <div id="screen-calculadora" class="screen">
    <div class="calc-wrap">
      <div class="calc-display" id="calcDisplay">0</div>
      <div class="calc-expr"    id="calcExpr"></div>
      <div class="calc-grid">
        <button class="calc-btn span2 btn-danger" onclick="calcClear()">C</button>
        <button class="calc-btn btn-op"           onclick="calcDel()">⌫</button>
        <button class="calc-btn btn-op"           onclick="calcInput('/')">÷</button>
        <button class="calc-btn" onclick="calcInput('7')">7</button>
        <button class="calc-btn" onclick="calcInput('8')">8</button>
        <button class="calc-btn" onclick="calcInput('9')">9</button>
        <button class="calc-btn btn-op" onclick="calcInput('*')">×</button>
        <button class="calc-btn" onclick="calcInput('4')">4</button>
        <button class="calc-btn" onclick="calcInput('5')">5</button>
        <button class="calc-btn" onclick="calcInput('6')">6</button>
        <button class="calc-btn btn-op" onclick="calcInput('-')">−</button>
        <button class="calc-btn" onclick="calcInput('1')">1</button>
        <button class="calc-btn" onclick="calcInput('2')">2</button>
        <button class="calc-btn" onclick="calcInput('3')">3</button>
        <button class="calc-btn btn-op" onclick="calcInput('+')">+</button>
        <button class="calc-btn"      onclick="calcInput('%')">%</button>
        <button class="calc-btn"      onclick="calcInput('0')">0</button>
        <button class="calc-btn"      onclick="calcInput('.')">.</button>
        <button class="calc-btn btn-equal" onclick="calcEqual()">=</button>
      </div>
      <div class="calc-history" id="calcHistory"></div>
    </div>
  </div>

  <script>
    // ── localStorage ──────────────────────────────
    function guardar(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
    function leer(k,d){ const r=localStorage.getItem(k); if(r===null) return d; try{return JSON.parse(r);}catch{return d;} }

    // ── Reloj ─────────────────────────────────────
    function reloj(){
      const n=new Date();
      const D=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
      const M=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      const h=n.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('clock').innerHTML=`${D[n.getDay()]} ${n.getDate()} ${M[n.getMonth()]}<br><strong style="font-size:1rem">${h}</strong>`;
    }
    setInterval(reloj,1000); reloj();

    // ── Navegación ────────────────────────────────
    const TITULOS={notas:'📝 NOTAS',tareas:'✅ TAREAS',enlaces:'🔗 ENLACES',calculadora:'🧮 CALCULADORA'};
    function goTo(id){
      document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
      document.getElementById('screen-'+id).classList.add('active');
      document.getElementById('pageTitle').textContent=TITULOS[id];
      document.getElementById('backBtn').classList.add('visible');
      if(id==='notas')   renderNotas();
      if(id==='tareas')  renderTareas();
      if(id==='enlaces') renderEnlaces();
    }
    function goHome(){
      document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
      document.getElementById('screen-home').classList.add('active');
      document.getElementById('pageTitle').textContent='📋 MI PANEL';
      document.getElementById('backBtn').classList.remove('visible');
      badges();
    }
    function badges(){
      const notas=leer('notas',[]), tareas=leer('tareas',[]), enlaces=leer('enlaces',[]);
      const pend=tareas.filter(t=>!t.completada).length;
      badge('badge-notas',   notas.length>0   ? notas.length   : null);
      badge('badge-tareas',  pend>0           ? pend           : null);
      badge('badge-enlaces', enlaces.length>0 ? enlaces.length : null);
    }
    function badge(id,v){
      const el=document.getElementById(id);
      if(!el) return;
      if(v!==null){el.textContent=v;el.classList.add('visible');}
      else{el.classList.remove('visible');}
    }

    // ── Escape HTML ───────────────────────────────
    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}

    // ── NOTAS ─────────────────────────────────────
    function agregarNota(){
      const ti=document.getElementById('notaTitulo').value.trim();
      const te=document.getElementById('notaTexto').value.trim();
      if(!ti&&!te) return;
      const notas=leer('notas',[]);
      notas.unshift({id:Date.now(),titulo:ti||'Sin título',texto:te,
        fecha:new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})});
      guardar('notas',notas);
      document.getElementById('notaTitulo').value='';
      document.getElementById('notaTexto').value='';
      renderNotas();
    }
    function eliminarNota(id){ guardar('notas',leer('notas',[]).filter(n=>n.id!==id)); renderNotas(); }
    function renderNotas(){
      const notas=leer('notas',[]);
      const el=document.getElementById('lista-notas');
      if(!notas.length){ el.innerHTML=`<div class="empty-state"><span class="empty-icon">📝</span>No hay notas. ¡Escribí la primera!</div>`; return; }
      el.innerHTML=notas.map(n=>`
        <div class="nota-item">
          <div class="nota-header">
            <div class="nota-titulo">${esc(n.titulo)}</div>
            <div class="nota-acciones"><span class="nota-fecha">${n.fecha}</span>
              <button class="btn-icon" onclick="eliminarNota(${n.id})">🗑</button></div>
          </div>
          <div class="nota-texto">${esc(n.texto)}</div>
        </div>`).join('');
    }

    // ── TAREAS ────────────────────────────────────
    function agregarTarea(){
      const inp=document.getElementById('tareaInput');
      const txt=inp.value.trim(); if(!txt) return;
      const t=leer('tareas',[]); t.push({id:Date.now(),texto:txt,completada:false});
      guardar('tareas',t); inp.value=''; renderTareas();
    }
    function toggleTarea(id){
      const t=leer('tareas',[]); const x=t.find(t=>t.id===id); if(x) x.completada=!x.completada;
      guardar('tareas',t); renderTareas();
    }
    function eliminarTarea(id){ guardar('tareas',leer('tareas',[]).filter(t=>t.id!==id)); renderTareas(); }
    function limpiarTareasCompletadas(){ guardar('tareas',leer('tareas',[]).filter(t=>!t.completada)); renderTareas(); }
    function renderTareas(){
      const tareas=leer('tareas',[]);
      const el=document.getElementById('lista-tareas');
      const stats=document.getElementById('tareasStats');
      const comp=tareas.filter(t=>t.completada).length, pend=tareas.length-comp;
      stats.textContent=tareas.length>0?`${pend} pendiente${pend!==1?'s':''} · ${comp} completada${comp!==1?'s':''}` :'';
      if(!tareas.length){ el.innerHTML=`<div class="empty-state"><span class="empty-icon">✅</span>No hay tareas. ¡Agregá la primera!</div>`; return; }
      const ord=[...tareas.filter(t=>!t.completada),...tareas.filter(t=>t.completada)];
      el.innerHTML=ord.map(t=>`
        <div class="tarea-item ${t.completada?'completada':''}">
          <button class="tarea-check ${t.completada?'checked':''}" onclick="toggleTarea(${t.id})">${t.completada?'✓':''}</button>
          <div class="tarea-texto">${esc(t.texto)}</div>
          <button class="btn-icon" onclick="eliminarTarea(${t.id})">🗑</button>
        </div>`).join('');
    }

    // ── ENLACES ───────────────────────────────────
    function agregarEnlace(){
      const nombre=document.getElementById('enlaceNombre').value.trim();
      const urlM  =document.getElementById('enlaceUrl').value.trim();
      const cat   =document.getElementById('enlaceCategoria').value.trim()||'General';
      const motor =document.getElementById('motorBusqueda').value;
      const term  =document.getElementById('terminoBusqueda').value.trim();
      if(!nombre){ alert('Ingresá un nombre.'); return; }
      let url=urlM;
      if(motor&&term) url=motor+encodeURIComponent(term);
      if(!url){ alert('Ingresá una URL o elegí motor + término.'); return; }
      const e=leer('enlaces',[]); e.push({id:Date.now(),nombre,url,categoria:cat});
      guardar('enlaces',e);
      ['enlaceNombre','enlaceUrl','enlaceCategoria','terminoBusqueda'].forEach(i=>document.getElementById(i).value='');
      document.getElementById('motorBusqueda').value='';
      renderEnlaces();
    }
    function eliminarEnlace(id){ guardar('enlaces',leer('enlaces',[]).filter(e=>e.id!==id)); renderEnlaces(); }
    function abrirEnlace(id){ const e=leer('enlaces',[]).find(e=>e.id===id); if(e) window.open(e.url,'_blank'); }
    function renderEnlaces(){
      const enlaces=leer('enlaces',[]);
      const el=document.getElementById('lista-enlaces');
      if(!enlaces.length){ el.innerHTML=`<div class="empty-state"><span class="empty-icon">🔗</span>No hay enlaces. ¡Guardá el primero!</div>`; return; }
      const g={};
      enlaces.forEach(e=>{ if(!g[e.categoria]) g[e.categoria]=[]; g[e.categoria].push(e); });
      let html='';
      Object.entries(g).forEach(([cat,items])=>{
        html+=`<div class="categoria-titulo">${esc(cat)}</div>`;
        items.forEach(e=>{
          const c=e.url.replace(/^https?:\/\//,'').substring(0,35)+(e.url.length>40?'…':'');
          html+=`<div class="enlace-item">
            <div style="flex:1;min-width:0">
              <div class="enlace-nombre">${esc(e.nombre)}</div>
              <div class="enlace-url">${esc(c)}</div>
            </div>
            <button class="btn-abrir" onclick="abrirEnlace(${e.id})">Abrir →</button>
            <button class="btn-icon"  onclick="eliminarEnlace(${e.id})">🗑</button>
          </div>`;
        });
      });
      el.innerHTML=html;
    }

    // ── CALCULADORA ───────────────────────────────
    let cExpr='', cHist=[];
    function calcInput(v){
      if(cExpr===''&&'*/+'.includes(v)) return;
      if(v==='.'){const p=cExpr.split(/[\+\-\*\/]/);if(p[p.length-1].includes('.')) return;}
      cExpr+=v; showCalc();
    }
    function calcClear(){ cExpr=''; showCalc(); }
    function calcDel(){ cExpr=cExpr.slice(0,-1); showCalc(); }
    function calcEqual(){
      if(!cExpr) return;
      try{
        if(!/^[\d\+\-\*\/\.\%\(\)\s]+$/.test(cExpr)) throw 0;
        const ex=cExpr.replace(/(\d+(?:\.\d+)?)\%/g,'($1/100)');
        // eslint-disable-next-line no-new-func
        const r=Function('"use strict";return('+ex+')')();
        if(!isFinite(r)) throw 0;
        const rs=parseFloat(r.toFixed(10)).toString();
        cHist.unshift(cExpr+' = '+rs); if(cHist.length>10) cHist.pop(); renderHist();
        cExpr=rs;
        document.getElementById('calcDisplay').textContent=rs;
        document.getElementById('calcExpr').textContent='';
      }catch{
        document.getElementById('calcDisplay').textContent='Error';
        setTimeout(()=>{cExpr='';showCalc();},900);
      }
    }
    function showCalc(){
      document.getElementById('calcDisplay').textContent=(cExpr.replace(/\*/g,'×').replace(/\//g,'÷'))||'0';
      document.getElementById('calcExpr').textContent='';
    }
    function renderHist(){
      document.getElementById('calcHistory').innerHTML=cHist.map(h=>`<div class="calc-history-item">${esc(h)}</div>`).join('');
    }
    document.addEventListener('keydown',e=>{
      if(!document.getElementById('screen-calculadora').classList.contains('active')) return;
      if(e.key>='0'&&e.key<='9') calcInput(e.key);
      else if(['+','-','*','/','.',',','%'].includes(e.key)) calcInput(e.key===','?'.':e.key);
      else if(e.key==='Enter'||e.key==='=') calcEqual();
      else if(e.key==='Backspace') calcDel();
      else if(e.key==='Escape') calcClear();
    });

    // ── INICIO ────────────────────────────────────
    badges();
  </script>
</body>
</html>
